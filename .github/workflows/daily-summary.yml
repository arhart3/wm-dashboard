name: Daily summary SMS

# ============================================================================
# Pre-market 08:50 ET digest of armed triggers via Twilio SMS.
#
# Two cron entries to absorb the DST shift:
#   * 12:50 UTC = 08:50 EDT (summer, mid-March -> early November)
#   * 13:50 UTC = 08:50 EST (winter)
# Both fire year-round; the off-DST one is a few minutes off but still
# pre-market and the SMS body is identical, so duplicate runs are
# harmless. To eliminate the duplicate entirely, deactivate the relevant
# entry seasonally — not worth the maintenance for a once-a-day digest.
#
# If Twilio secrets are not configured the script no-ops and the digest
# only goes to stdout (visible in the workflow logs).
# ============================================================================

on:
  schedule:
    - cron: "50 12 * * 1-5"  # 08:50 EDT (DST)
    - cron: "50 13 * * 1-5"  # 08:50 EST
  workflow_dispatch: {}

concurrency:
  group: daily-summary
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          if [[ -n "${{ secrets.TWILIO_ACCOUNT_SID }}" ]]; then
            pip install twilio
          fi

      - name: Send pre-market digest
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          WM_NOTIFY_PHONE: ${{ secrets.WM_NOTIFY_PHONE }}
        run: |
          # No package install needed — script reads triggers.yaml directly
          # and uses the stdlib + pyyaml + (optional) twilio.
          PYTHONPATH=src python scripts/daily_summary.py
