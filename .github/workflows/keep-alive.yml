name: Keep dashboard awake

# ============================================================================
# Streamlit Cloud's Community tier sleeps apps after a period of inactivity.
# A sleeping app shows a "Yes, get this app back up!" splash to the next
# visitor and takes ~30s to wake. This workflow defeats that by issuing a
# lightweight HTTPS HEAD request to the public URL every ~10 minutes during
# a wide active window (covering US business hours plus evenings, all 7
# days). The request hits the password-gated front door but still counts as
# inbound traffic for Streamlit's idle timer.
#
# Cost: one ~5s ubuntu-latest job per ping. With ~12 pings/hour x 18h x 7d
# = ~1500 jobs/month, well under GitHub's 2,000 free minutes ceiling on
# private repos (and unlimited on public repos like ours).
#
# Cron offset (7,17,27,...) deliberately avoids :00/:30 peak-of-hour load.
# ============================================================================

on:
  schedule:
    # Every 10 minutes from 12:07 UTC to 03:57 UTC of the next day, every day.
    # GitHub cron doesn't support spanning midnight in one expression, so we
    # use two: 12:07-23:57 and 00:07-03:57.
    - cron: "7,17,27,37,47,57 12-23 * * *"
    - cron: "7,17,27,37,47,57 0-3 * * *"
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping dashboard
        run: |
          URL="https://arhart3-wm-dashboard-app-dp3loo.streamlit.app/"
          echo "Pinging ${URL}..."
          # Follow redirects, fail on HTTP >= 400, retry up to 2 times on
          # transient errors (Streamlit Cloud sometimes 502s briefly during
          # auto-wake).
          status=$(curl -sS -L -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            --retry 2 --retry-delay 10 \
            "${URL}")
          echo "HTTP ${status}"
          # 200/3xx = awake, 503 = waking up (still counts as activity).
          # Anything else: log and proceed (don't fail the workflow on flakes).
          if [[ "${status}" -ge 500 && "${status}" -ne 503 ]]; then
            echo "::warning::Unexpected status ${status}; dashboard may be down."
          fi
