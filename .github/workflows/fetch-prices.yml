name: Fetch prices

# ============================================================================
# Schedule: every 30 minutes during US equity market hours, Monday-Friday.
#
# US market hours are 09:30 - 16:00 ET. UTC offsets vary with daylight saving:
#   * EST (winter, UTC-5): market =  14:30-21:00 UTC
#   * EDT (summer, UTC-4): market =  13:30-20:00 UTC
#
# We use a single union window of 13:00 - 21:00 UTC, Mon-Fri, every :07 and
# :37. The :07/:37 offset (rather than :00/:30) deliberately avoids GitHub
# Actions' peak-of-hour load; runs scheduled at :00 are heavily delayed or
# skipped during high-traffic periods. This offset has dramatically better
# delivery rates against the same shared runner pool.
#
# Cron field reference: minute hour day-of-month month day-of-week
#   "7,37 13-21 * * 1-5"  -> minutes :07 and :37,
#                            hours 13 through 21 inclusive (UTC),
#                            any day-of-month, any month,
#                            Monday through Friday.
#
# GitHub Actions cron is best-effort — even with the offset, runs may be
# delayed under heavy load. Treat the snapshot timestamp in prices.json
# (not the cron schedule) as the source of truth for freshness.
# ============================================================================

on:
  schedule:
    # Pre-market 08:50 ET ≈ 12:50 UTC (DST) / 13:50 UTC (EST). Fire both
    # to absorb the DST shift; no harm if one is skipped.
    - cron: "50 12 * * 1-5"
    - cron: "50 13 * * 1-5"
    # Every 15 minutes during the union of EST and EDT market windows
    # (13:00–21:00 UTC). Offset 7 to avoid GitHub's :00/:15 peak load.
    - cron: "7,22,37,52 13-20 * * 1-5"
    # Post-close 16:15 ET ≈ 20:15 UTC (DST) / 21:15 UTC (EST).
    - cron: "15 20 * * 1-5"
    - cron: "15 21 * * 1-5"
  workflow_dispatch: {}  # Manual "Run workflow" button in the Actions UI.

# Cancel any in-flight run when a newer one starts. Avoids two jobs racing
# to commit the same data/ files.
concurrency:
  group: fetch-prices
  cancel-in-progress: true

permissions:
  contents: write  # Needed to push the refreshed data/ files back to the repo.

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          # Use a token with write scope so the post-fetch commit can push.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history not needed; shallow keeps checkout fast.
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install fetch dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[fetch]"

      - name: Fetch prices
        env:
          # All provider keys are optional. The fetcher walks the chain:
          # Polygon -> AlphaVantage -> Finnhub -> yfinance -> last-known-good.
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python scripts/fetch_prices.py -v

      - name: Evaluate triggers
        # Reads the just-refreshed prices.json, fires any ARMED trigger
        # whose rule is now satisfied, and (if Twilio is configured) sends
        # an SMS. Never auto-executes trades.
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          WM_NOTIFY_PHONE: ${{ secrets.WM_NOTIFY_PHONE }}
        run: |
          # Twilio is an optional dependency; install only when secrets
          # are present so we don't pay an install cost on every cron run.
          if [[ -n "${TWILIO_ACCOUNT_SID}" ]]; then
            pip install --quiet twilio
          fi
          python scripts/evaluate_triggers.py --apply --notify

      - name: Commit refreshed snapshot
        env:
          # Use the bot identity rather than the repo owner.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add data/prices.json data/history.parquet config/triggers.yaml data/trigger_history.yaml
          if git diff --cached --quiet; then
            echo "No price changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "[bot] price refresh ${ts}"
          # Race-resilient push: if a concurrent push (manual or another
          # workflow run) landed while we were fetching, rebase on top and
          # retry. Three attempts is enough — at 30-min cadence the chance
          # of three consecutive races is effectively zero.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected; pulling and rebasing (attempt ${attempt})."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
