# Pin the institutional light theme. The dashboard mirrors the printed
# grayscale reports (Calibri prose, Consolas numerics, single-rule tables).
# A dark theme breaks the palette and renders body text white-on-white.

[theme]
base = "light"
primaryColor = "#111111"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F6F6"
textColor = "#111111"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
