# Universe of tickers to refresh on the cron. Source-of-truth for the
# fetch script — survives an unavailable workbook. Add or remove rows
# manually when the holdings list changes.
#
# Schema:
#   ticker:       symbol (yfinance / Finnhub form)
#   asset_class:  equity | etf | index
#   sector:       free text, optional
#   benchmark:    true if this is the IPS benchmark (single ticker)
#
# ^GSPC is the IPS benchmark (S&P 500 index). Finnhub free tier does not
# cover indices, so the fetch script falls through to yfinance for it.

tickers:
